name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 6 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze-python:
    name: Analyze Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:python

  analyze-swift:
    name: Analyze Swift
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build Swift target
        run: >-
          xcodebuild
          -project CodexBuddyMac/CodexBuddyMac.xcodeproj
          -scheme CodexBuddyMac
          -configuration Debug
          -sdk macosx
          ARCHS="$(uname -m)"
          CODE_SIGNING_ALLOWED=NO
          build

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:swift
